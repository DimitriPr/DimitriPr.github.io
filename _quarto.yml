project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"

website:
  title: "PROUVOST Dimitri"
  description: "MSc Finance · HEC Lausanne · Quantitative research portfolio"
  
  navbar:
    background: "#0d0d0d"
    foreground: "#e0e0e0"
    right:
      - icon: github
        href: https://github.com/DimitriPr
        aria-label: GitHub
      - icon: envelope
        href: mailto:prouvostdimitri@gmail.com
        aria-label: Email

  page-footer:
    background: "#0a0a0a"
    border: false
    left: "© 2026 PROUVOST Dimitri"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme: darkly
    css: styles.css
    toc: false
    smooth-scroll: true
    link-external-newwindow: true
    anchor-sections: false
    page-layout: full
    include-after-body:
      text: |
        <script>
        document.addEventListener('DOMContentLoaded', function() {
          var brand = document.querySelector('.navbar-brand');
          if (brand) {
            brand.innerHTML = '<span class="brand-last">PROUVOST</span> <span class="brand-first">Dimitri</span>';
          }
        });
        </script>